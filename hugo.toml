baseURL = 'https://kaorz.com/blog/'
languageCode = 'zh-CN'
title = '阿伟的博客'
theme = 'blowfish'
defaultContentLanguage = 'zh-cn'
enableRobotsTXT = true

[languages]
  [languages.zh-cn]
    languageCode = 'zh-CN'
    contentDir = 'content'
    weight = 1
    title = '阿伟的博客'
    locale = 'zh-CN'

[pagination]
  pagerSize = 20

[params]
  colorScheme = 'slate'
  defaultAppearance = 'light'
  autoSwitchAppearance = true
  enableSearch = true
  enableCodeCopy = true
  mainSections = ['posts', 'archives']

  [params.header]
    layout = 'basic'

  [params.footer]
    showCopyright = true
    showThemeAttribution = true
    showAppearanceSwitcher = true
    showScrollToTop = true

  [params.homepage]
    layout = 'profile'
    showRecent = true
    showRecentItems = 5
    showMoreLink = true
    showMoreLinkDest = 'posts'
    cardView = false

  [params.article]
    showDate = true
    showAuthor = true
    showReadingTime = true
    showWordCount = true
    showPagination = true
    showBreadcrumbs = true

  [params.list]
    showSummary = true
    groupByYear = true

[[menu.main]]
  name = '文章'
  pageRef = 'posts'
  weight = 1

[[menu.main]]
  name = '标签'
  pageRef = 'tags'
  weight = 2

[markup]
  [markup.highlight]
    noClasses = false

[outputs]
  home = ['HTML', 'RSS', 'JSON']
